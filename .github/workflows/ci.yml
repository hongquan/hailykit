name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node >=21 required by the test script's `node --test "<glob>"`.
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check:skills
      - run: npm test
