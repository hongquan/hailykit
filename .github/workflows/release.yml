name: Release

on:
  push:
    tags: ['v*']

# gh release create needs write access to the repo's releases.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run release:pack
      # Idempotent publish: a release may already exist (e.g. created locally
      # right after the tag push) — fall back to replacing the asset instead
      # of failing on the name collision.
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          gh release create "$tag" release/hailykit.zip \
            --title "$tag" --notes "Release $tag" --verify-tag \
          || gh release upload "$tag" release/hailykit.zip --clobber
